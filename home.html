<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spendify</title>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- tailwindcss -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- favicon -->
    <link rel="shortcut icon" href="./coins-solid-full.svg" type="image/x-icon">
</head>

<body>
    <nav class="bg-white dark:bg-gray-900 sticky w-full border-b border-gray-200 dark:border-gray-600">
        <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">
            <a href="https://flowbite.com/" class="flex items-center space-x-3 rtl:space-x-reverse">
                <img src="./coins-solid-full.svg" class="h-8" alt="Flowbite Logo">
                <span class="self-center text-2xl font-bold whitespace-nowrap text-violet-400">Spendly</span>
            </a>
            <div class="flex md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse">
                <button type="button" onclick="logout()"
                    class=" me-5 text-white bg-violet-400 hover:bg-violet-600 focus:ring-4 focus:outline-none focus:ring-violet-200 font-medium rounded-lg text-sm px-4 py-2 text-center dark:bg-violet-400 dark:hover:bg-violet-600 dark:focus:ring-violet-200">Logout</button>

            </div>

            <div class="items-center justify-between hidden w-full md:flex md:w-auto md:order-1" id="navbar-sticky">
                <ul
                    class="flex flex-col p-4 md:p-0 mt-4 font-medium border border-gray-100 rounded-lg bg-gray-50 md:space-x-8 rtl:space-x-reverse md:flex-row md:mt-0 md:border-0 md:bg-white dark:bg-gray-800 md:dark:bg-gray-900 dark:border-gray-700">
                    <li>
                        <a href="#" class="block py-2 px-3 text-violet-400  rounded-sm ">Home</a>
                    </li>
                    <li>
                        <a href="#" class="block py-2 px-3 text-violet-400 rounded-sm ">Income</a>
                    </li>
                    <li>
                        <a href="#" class="block py-2 px-3 text-violet-400 rounded-sm ">History</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>
    <h3 id="name"></h3>
    <section class="inset-shadow-sm m-10 bg-stone-50">

        <div class="p-5 m-10 rounded-lg">
            <h3 class="text-center text-violet-400 text-2xl font-semibold">Add money</h3>
            <div class="flex flex-col md:flex-row justify-center gap-5 mt-5">

                <input type="text" id="income-type"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-75 p-2.5 "
                    placeholder="Income type" required />
                <input type="number" id="income"
                    class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-75 p-2.5 "
                    placeholder="Enter amound" required />
                <button type="button" onclick="addIncome()"
                    class=" me-5 text-white bg-violet-400 hover:bg-violet-600 focus:ring-4 focus:outline-none focus:ring-violet-200 font-medium rounded-lg text-sm px-4 py-2 text-center dark:bg-violet-400 dark:hover:bg-violet-600 dark:focus:ring-violet-200">Add</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mt-10">
                <div class="bg-violet-400 rounded-lg p-5 text-white">
                    <h3 class="m-5 font-bold">Total income</h3>
                    <p id="total-income" class="text-center m-20 font-bold text-2xl"><span id="totalIncome">0</span>/-
                        Rs</p>
                </div>
                <div class="bg-violet-400 rounded-lg p-5 text-white">
                    <h3 class="m-5 font-bold">Total expenses</h3>
                    <p class="text-center m-20 font-bold text-2xl"><span id="totalExpense">0</span>/- Rs</p>
                </div>
                <div class="bg-violet-400 rounded-lg p-5 text-white">
                    <h3 class="m-5 font-bold">Available Balance</h3>
                    <p class="text-center m-20 font-bold text-2xl"><span id="avlBalance">0</span>/- Rs</p>
                </div>
            </div>

        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-10">
            <div class="m-15 rounded-lg  p-5">
                <h3 class="text-center font-semibold text-2xl text-violet-400 pb-5">Expenses</h3>
                <div class=" ">

                    <div>
                        <input type="text" id="expense-type" class="border border-gray-300 rounded-lg p-2.5 w-full mb-5"
                            placeholder="Expense type">
                    </div>
                    <div>
                        <input type="number" id="expense" class="border border-gray-300 rounded-lg p-2.5 w-full mb-5"
                            placeholder="Enter amount">

                    </div>
                    <button onclick="expense()"
                        class="w-full text-white bg-violet-400 hover:bg-violet-600 rounded-lg px-4 py-2">
                        Add
                    </button>
                </div>

            </div>
            

                <div id="list" class="max-h-[500px] overflow-y-auto p-2 shadow-lg m-5 rounded-lg ">
                    <h1 class="text-center font-semibold text-2xl text-violet-400 pb-5">Transaction list</h1>


                </div>
            
        </div>
    </section>

    <script>
        let TotalIncome = 0
        var avlBalance = TotalIncome
        var totalExpense = 0


        let today = new Date()

        let day = String(today.getDate())
        let month = String(today.getMonth() + 1).padStart(2, '0');
        let year = today.getFullYear();

        let hours = String(today.getHours()).padStart(2, '0');
        let minutes = String(today.getMinutes()).padStart(2, '0');
        let seconds = String(today.getSeconds()).padStart(2, '0');
        let session = "AM"
        if (hours >= 12) {
            session = "PM";
        }

        if (hours == 0) {
            hours = 12; // midnight
        } else if (hours > 12) {
            hours = hours - 12; // convert to 12-hour format
        }
        let time = hours + ":" + minutes + ":" + seconds
        let formattedDateAndTime = `${day}/${month}/${year}  ${time}`;
        let users = JSON.parse(localStorage.getItem("user"))
        document.getElementById('name').innerHTML = ` <h3 id="name" class=" m-10 text-violet-400 text-2xl font-semibold">Welcome ${users.usrname}!</h3>`


        function addIncome() {
            let income = document.getElementById("income").value
            let incomeType = document.getElementById("income-type").value
            TotalIncome += Number(income)
            document.getElementById("totalIncome").innerHTML = TotalIncome;
            avlBalance = TotalIncome - totalExpense
            document.getElementById("avlBalance").innerHTML = avlBalance;




            document.getElementById("list").innerHTML =
                `<div class="flex flex-row justify-between">
                 <div>
                        <p class="text-2xl text-violet-400 ">${incomeType}</p>
                    <p class="font-semibold text-violet-400">${formattedDateAndTime}</p>
                    </div>
                    <div>
                        <p class="text-2xl text-green-500">+${income}</p>
                    </div>
                </div>
                          
            `+ (list.innerHTML || "")
            // container.scrollTop = 0;
            // input.value = "";


        }

        function expense() {
            let expense = document.getElementById("expense").value
            let expenseType = document.getElementById("expense-type").value

            console.log(TotalIncome);
            console.log(avlBalance);




            avlBalance = avlBalance - expense
            document.getElementById("avlBalance").innerHTML = avlBalance;

            if (expense > avlBalance) {
                alert("low balance")
            } else {
                totalExpense += Number(expense)
                console.log(totalExpense);

                document.getElementById("totalExpense").innerHTML = totalExpense;

                document.getElementById("list").innerHTML = `
              <div class="flex flex-row justify-between">
                    <div>
                        <p class="text-2xl text-violet-400 ">${expenseType}</p>
                    <p class="font-semibold text-violet-400">${formattedDateAndTime}</p>
                    </div>
                    <div>
                        <p class="text-2xl text-red-500">-${expense}</p>
                    </div>
                    
                </div>
            
            `+ (list.innerHTML || "")
                // container.scrollTop = 0;
                // input.value = "";
            }



        }

        function logout() {
            localStorage.clear()
            window.location.href = "./index.html"
        }
    </script>

</body>

</html>
